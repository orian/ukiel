# E2E stack for `crates/ukiel-e2e` (see docs/superpowers/specs/2026-07-05-ukiel-testing-design.md).
# Bring up with `docker compose up -d --wait`, run `make e2e`, tear down with `docker compose down -v`.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30

  # ClickHouse reference for the official benchmark suites (plan 34).
  # OPT-IN ONLY: `docker compose --profile bench up -d clickhouse`. Without the
  # profile it never starts, so `make e2e`, `make test` and a plain
  # `docker compose up -d` are completely untouched by it.
  clickhouse:
    image: clickhouse/clickhouse-server:26.6
    profiles: [bench]
    environment:
      # The entrypoint `chown -R`s every path it manages, including
      # user_files_path — which we point at a READ-ONLY mount of the 14 GB
      # fixture, so the chown fails and the container dies. This disables it.
      # Safe: the server still runs as the `clickhouse` user, the fixture is
      # world-readable (644), and its own data dir is already owned correctly
      # in the image.
      CLICKHOUSE_DO_NOT_CHOWN: 1
      # 26.6 generates a random password for `default` on first start. This is a
      # throwaway local bench container with no network exposure beyond the host
      # port and no data worth guarding — a password would only be a secret to
      # thread through the harness.
      CLICKHOUSE_SKIP_USER_SETUP: 1
    # HTTP interface only. 9000 (the native protocol) is deliberately NOT
    # exposed: it is the port MinIO also wants, as the minio service notes below.
    ports:
      - "${UKIEL_CLICKHOUSE_PORT:-8123}:8123"
    volumes:
      # The 14 GB ClickBench fixture, read-only and IN PLACE — never copied into
      # the container, never re-fetched. NOT mounted at the default user_files
      # path: the entrypoint chowns that dir on startup and dies against a :ro
      # mount, so config.d/user_files.xml moves user_files_path here instead.
      - ./bench/datasets/hits:/fixtures/hits:ro
      # A single FILE, not the directory: mounting the whole config.d would
      # shadow the image's own docker_related_config.xml, which is what makes the
      # server listen on 0.0.0.0 instead of only inside the container.
      - ./bench/clickhouse/config.d/user_files.xml:/etc/clickhouse-server/config.d/user_files.xml:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40

  minio:
    image: minio/minio
    # Create the `ukiel` bucket by pre-making its data directory (MinIO in
    # filesystem mode treats a top-level dir under the data path as a bucket),
    # then start the server. This avoids a separate one-shot init container,
    # which `docker compose up --wait` can spuriously treat as a failed wait
    # target when it exits before the long-running services report healthy.
    entrypoint: sh -c 'mkdir -p /data/ukiel && exec minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    # Host ports default to 19000/19001: 9000 is contested on dev machines
    # (ClickHouse native protocol, other MinIOs). Overridable; if you override
    # UKIEL_MINIO_PORT, set UKIEL_E2E_S3 to match.
    ports:
      - "${UKIEL_MINIO_PORT:-19000}:9000"
      - "${UKIEL_MINIO_CONSOLE_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 30
