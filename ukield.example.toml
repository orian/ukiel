# ukield example configuration. Start the compose stack first:
#   docker compose up -d --wait
# then: cargo run -p ukield -- --config ukield.example.toml

# Which workers this process runs (default: all four).
roles = ["ingest", "query", "compactor", "gc"]

[catalog]
url = "postgres://postgres:postgres@127.0.0.1:5432/postgres"

[object_store]
kind = "s3" # or "memory" for a throwaway in-process store (no MinIO needed)
endpoint = "http://127.0.0.1:19000"
bucket = "ukiel"
access_key_id = "minioadmin"
secret_access_key = "minioadmin"
allow_http = true

[query]
listen = "127.0.0.1:8080"
# Also serves GET /metrics (Prometheus) and GET /readyz on this listener.
# A process without the query role emits metrics but has no endpoint (P2).
cache_dir = "" # non-empty = local disk cache (read-through + write-through prewarm)
# Cache tuning (defaults shown; uncomment only to override):
# cache_write_through = true              # prewarm the cache with every written object
# cache_large_object_threshold = 67108864 # objects over 64 MiB cache as aligned chunks
# cache_chunk_size = 8388608              # 8 MiB chunk files for large objects
statement_timeout_secs = 300 # must be < gc.tombstone_grace_secs (issue 0002)

[ingest]
brokers = "127.0.0.1:9092"
group_id = "ukield"
flush_interval_ms = 2000 # demo-friendly freshness; production default 10000
max_buffer_rows = 100000
l0_slowdown_parts = 30        # halve flush rate when a partition holds this many live L0 files
l0_stop_parts = 200           # stop flushing (memory valve at 2x max_buffer_rows)
warn_partitions_per_flush = 64 # backfill fan-out warning threshold
max_event_age_days = 3650    # skip events older than this (raise for backfills)
max_event_future_secs = 3600 # skip events from the future (unit-bug detector)

[compactor]
poll_interval_ms = 5000
l0_fanout = 2            # L0 merge trigger (demo; prod ~4) — L0 files are unpruned by key
fanout = 2               # L1+ run-count trigger (demo; prod ~10) — runs are key-disjoint
finalize_after_secs = 60 # fold quiet partitions into one run (demo; prod ~3600)

[gc]
poll_interval_ms = 60000
tombstone_grace_secs = 900
orphan_grace_secs = 3600

[collector]
# Periodic metrics collector (P2): lag/backlog/pool/disk gauges. Runs in every
# process regardless of role.
interval_ms = 30000    # gauge refresh cadence
cache_walk_every = 10  # run the (expensive) cache-dir byte walk every Nth tick

# Standalone Prometheus listener for a process WITHOUT the query role (which
# already serves /metrics on its own listener). Empty = disabled; a query-less
# process then logs a startup warning that its metrics have no endpoint.
# metrics_listen = "127.0.0.1:9187"

# Tables are bootstrapped idempotently at startup. `topic`/`ts_column` are the
# pre-pipelines routing config (see docs/notes/2026-07-06-pipelines.md).
[[tables]]
name = "events"
topic = "events"
ts_column = "ts"
packing_key = "tenant_id"
sort_key = ["tenant_id", "ts"]
partition_columns = ["day"]
namespaces = [1, 2, 3]
# Placement at rest: default packed; `placement = "separated"` gives every
# tenant dedicated files; `target_file_mb = 256` packs small tenants into
# ~256 MB files while big tenants separate organically.

[[tables.columns]]
name = "tenant_id"
type = "int64"

[[tables.columns]]
name = "ts"
type = "timestamp_ms"

[[tables.columns]]
name = "payload"
type = "utf8"
